<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intra | Selector de Entornos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <style>
        :root {
            --bg-dark: #050505;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border-color: rgba(255, 255, 255, 0.08);
            --intra-accent: #7551FF;
            --glass-bg: rgba(15, 15, 15, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            -webkit-font-smoothing: antialiased;
        }

        /* ----- Background FX ----- */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            pointer-events: none;
            background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.03;
        }

        .glow-blob {
            position: fixed;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(117, 81, 255, 0.15), transparent 60%);
            top: -200px;
            left: -200px;
            z-index: 0;
            pointer-events: none;
            filter: blur(80px);
            animation: pulseFloat 10s infinite alternate;
        }

        .glow-blob.blue {
            background: radial-gradient(circle, rgba(1, 241, 227, 0.1), transparent 60%);
            bottom: -300px;
            right: -200px;
            top: auto;
            left: auto;
            animation: pulseFloat 12s infinite alternate-reverse;
        }

        @keyframes pulseFloat {
            0% {
                transform: scale(1) translate(0, 0);
            }

            100% {
                transform: scale(1.1) translate(50px, 50px);
            }
        }

        /* ----- Left Panel (Branding) ----- */
        .left-panel {
            flex: 0 0 40%;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 10;
            border-right: 1px solid var(--border-color);
            background: linear-gradient(135deg, rgba(10, 10, 12, 0.8), rgba(5, 5, 5, 1));
            backdrop-filter: blur(20px);
        }

        .brand-logo {
            height: 32px;
            margin-bottom: 2rem;
        }

        .title-container h1 {
            font-size: 4.5rem;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -2px;
            background: linear-gradient(180deg, #FFFFFF 0%, #A0A0A0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            padding-top: 0.1em;
            padding-bottom: 0.1em;
        }

        .title-container p {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 80%;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--intra-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(117, 81, 255, 0.4);
        }

        .user-info-text {
            display: flex;
            flex-direction: column;
        }

        .user-info-text span {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .user-info-text strong {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            border: 1px solid transparent;
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.03);
            border-color: var(--border-color);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-outline.danger:hover {
            color: #ff5555;
            background: rgba(255, 85, 85, 0.1);
            border-color: rgba(255, 85, 85, 0.3);
        }

        /* ----- Right Panel (Selection) ----- */
        .right-panel {
            flex: 1;
            padding: 4rem;
            position: relative;
            z-index: 10;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        .right-panel::-webkit-scrollbar {
            width: 8px;
        }

        .right-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .right-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .env-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(117, 81, 255, 0.1);
            border: 1px solid rgba(117, 81, 255, 0.3);
            color: #b5a1ff;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        /* ----- Ultra Premium Cards ----- */
        .client-card {
            position: relative;
            height: 260px;
            border-radius: 24px;
            text-decoration: none;
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            background: rgba(20, 20, 20, 0.5);
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .client-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(var(--brand-rgb), 0.2) 0%, transparent 60%);
            opacity: 0.5;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        /* Hover effect pushes card up and creates a massive glow */
        .client-card:hover {
            transform: translateY(-8px);
            border-color: rgba(var(--brand-rgb), 0.5);
            background: rgba(30, 30, 30, 0.6);
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.6),
                0 0 60px rgba(var(--brand-rgb), 0.15),
                inset 0 0 0 1px rgba(var(--brand-rgb), 0.3);
        }

        .client-card:hover::before {
            opacity: 1;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 2;
            position: relative;
        }

        .client-logo {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
        }

        .client-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .client-logo span {
            font-size: 1.8rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
        }

        .play-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .client-card:hover .play-icon {
            background: rgba(var(--brand-rgb), 1);
            color: #000;
            transform: scale(1.1);
            border-color: transparent;
            box-shadow: 0 0 20px rgba(var(--brand-rgb), 0.6);
        }

        .card-bottom {
            z-index: 2;
            position: relative;
        }

        .client-name {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .client-slug {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-family: 'SF Mono', monospace;
        }

        /* Status indicator */
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ebd59;
            margin-right: 6px;
            box-shadow: 0 0 8px #2ebd59;
        }

        /* Loaders */
        .loading-wrap {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .spin {
            animation: spin 1s linear infinite;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--intra-accent);
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            body {
                flex-direction: column;
                overflow: auto;
            }

            .left-panel {
                flex: none;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 3rem;
            }

            .right-panel {
                padding: 3rem;
                overflow: visible;
            }

            .title-container h1 {
                font-size: 3.5rem;
            }
        }

        @media (max-width: 600px) {

            .left-panel,
            .right-panel {
                padding: 2rem;
            }

            .title-container h1 {
                font-size: 2.8rem;
            }

            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="noise-overlay"></div>
    <div class="glow-blob"></div>
    <div class="glow-blob blue"></div>

    <!-- Panel Izquierdo (Branding & Info) -->
    <aside class="left-panel">
        <div>
            <img src="src/assets/intra-logo.png" alt="Intra" class="brand-logo">
            <div class="title-container">
                <h1>Sistemas<br>Inteligentes.</h1>
                <p>Accede a resultados en tiempo real.</p>
            </div>
        </div>

        <div>
            <div class="user-profile">
                <div class="avatar" id="user-avatar">?</div>
                <div class="user-info-text">
                    <span>Sesión actual</span>
                    <strong id="hub-user-name">Cargando...</strong>
                </div>
            </div>
            <div class="actions">
                <a id="admin-panel-btn" href="admin.html" class="btn btn-outline" style="display:none;">
                    <ion-icon name="server-outline"></ion-icon> Base de Datos
                </a>
                <button onclick="logout()" class="btn btn-outline danger">
                    <ion-icon name="power-outline"></ion-icon> Desconectar
                </button>
            </div>
        </div>
    </aside>

    <!-- Panel Derecho (Grid de Dashboards) -->
    <main class="right-panel">
        <div id="admin-badge-area"></div>

        <div id="clients-container" class="grid-container">
            <div class="loading-wrap">
                <ion-icon name="scan-outline" class="spin"></ion-icon>
                <p>Estableciendo conexión segura...</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="src/config.js"></script>
    <script src="src/auth.js"></script>
    <script>
        function hexToRgb(hex) {
            let r = 117, g = 81, b = 255;
            if (hex && hex.match(/^#[0-9a-fA-F]{6}$/)) {
                r = parseInt(hex.substring(1, 3), 16);
                g = parseInt(hex.substring(3, 5), 16);
                b = parseInt(hex.substring(5, 7), 16);
            }
            return `${r}, ${g}, ${b}`;
        }

        async function loadHub() {
            const session = getSession();
            if (!session) { window.location.href = 'login.html'; return; }

            const userName = session.name || session.email;
            document.getElementById('hub-user-name').textContent = userName;
            document.getElementById('user-avatar').textContent = userName.charAt(0).toUpperCase();

            if (session.role === 'admin') {
                document.getElementById('admin-panel-btn').style.display = 'inline-flex';
                document.getElementById('admin-badge-area').innerHTML = `
                    <div class="env-badge">
                        <ion-icon name="shield-half-outline"></ion-icon> Acceso Total (Admin)
                    </div>
                `;
            } else {
                document.getElementById('admin-badge-area').innerHTML = `
                    <div class="env-badge">
                        <ion-icon name="cube-outline"></ion-icon> Propiedades Disponibles
                    </div>
                `;
            }

            const { data: clients, error } = await supabase
                .from('clients_config')
                .select('id_slug, name, logo_url, theme_primary')
                .in('id_slug', session.clients);

            const container = document.getElementById('clients-container');

            if (error || !clients || clients.length === 0) {
                container.innerHTML = `
                    <div class="loading-wrap" style="color:#ff5555;">
                        <ion-icon name="warning-outline" style="font-size:3rem; margin-bottom:1rem;"></ion-icon>
                        <p>No tienes acceso a ningún entorno.</p>
                    </div>`;
                return;
            }

            container.innerHTML = clients.map(client => {
                const rgb = hexToRgb(client.theme_primary);
                const init = client.name ? client.name.charAt(0).toUpperCase() : '?';
                const logo = client.logo_url
                    ? `<img src="${client.logo_url}" alt="${client.name}">`
                    : `<span>${init}</span>`;

                return `
                    <a class="client-card" href="index.html?client=${client.id_slug}" style="--brand-rgb: ${rgb};">
                        <div class="card-top">
                            <div class="client-logo">${logo}</div>
                            <div class="play-icon"><ion-icon name="arrow-forward"></ion-icon></div>
                        </div>
                        <div class="card-bottom">
                            <h3 class="client-name">${client.name}</h3>
                        </div>
                    </a>
                `;
            }).join('');
        }

        loadHub();
    </script>
</body>

</html>
