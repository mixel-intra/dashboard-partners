<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0A0618">
    <title>Cargando lead…</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
            background: #F2F2F7; color: #333;
            display: flex; align-items: center; justify-content: center;
        }
        .ll-card {
            background: #fff;
            border-radius: 14px;
            padding: 26px 30px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 360px;
            margin: 16px;
        }
        .ll-title  { font-size: 16px; font-weight: 700; color: #0A0A0A; margin-bottom: 6px; }
        .ll-sub    { font-size: 13px; color: #6E6E73; line-height: 1.5; }
        .ll-spin   {
            width: 28px; height: 28px; border-radius: 50%;
            border: 3px solid #E5E5EA; border-top-color: #007AFF;
            margin: 0 auto 14px;
            animation: ll-rotate 0.9s linear infinite;
        }
        @keyframes ll-rotate { to { transform: rotate(360deg); } }
        code { background: #F0F0F3; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="ll-card" id="ll-status">
        <div class="ll-spin"></div>
        <div class="ll-title">Cargando lead…</div>
        <div class="ll-sub">Recuperando datos de tu solicitud.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="src/config.js"></script>
    <script src="src/lead-template-render.js"></script>
    <script>
    (async () => {
        const statusEl = document.getElementById('ll-status');
        function showError(title, sub) {
            statusEl.innerHTML = `
                <div class="ll-title">${title}</div>
                <div class="ll-sub">${sub}</div>`;
        }

        const params = new URLSearchParams(location.search);
        const leadId = params.get('id') || params.get('lead');
        if (!leadId) {
            showError('Lead no especificado', 'Falta el parámetro <code>?id=&lt;lead_id&gt;</code> en la URL.');
            return;
        }

        // 1) Buscar el lead en qualified_leads (incluye el client_id)
        const { data: lead, error: lErr } = await window.adminSupabase
            .from('qualified_leads')
            .select('client_id, payload')
            .eq('lead_id', String(leadId))
            .maybeSingle();

        if (lErr) { showError('Error consultando la base', lErr.message); return; }
        if (!lead) {
            showError('Lead no encontrado',
                `No existe un lead calificado con ID <code>${escapeHtml(leadId)}</code>. ` +
                'Verifica con tu administrador que el lead haya sido sincronizado.');
            return;
        }

        // 2) Cargar la plantilla del cliente
        const { data: cfg, error: cErr } = await window.adminSupabase
            .from('clients_config')
            .select('name, lead_template')
            .eq('id_slug', lead.client_id)
            .single();

        if (cErr) { showError('Error consultando la plantilla', cErr.message); return; }
        if (!cfg || !cfg.lead_template || !cfg.lead_template.html) {
            showError('Plantilla no configurada',
                `El cliente <code>${escapeHtml(lead.client_id)}</code> aún no tiene plantilla HTML configurada.`);
            return;
        }

        // 3) Renderizar
        const html = window.LeadTemplate.render(cfg.lead_template.html, lead.payload || {});

        // Si es documento completo: reemplaza la página entera.
        // Si es fragmento: el render ya lo envolvió con chrome mínimo.
        document.open();
        document.write(html);
        document.close();

        function escapeHtml(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
    })().catch(err => {
        const el = document.getElementById('ll-status');
        if (el) el.innerHTML = `<div class="ll-title">Error inesperado</div><div class="ll-sub">${err.message}</div>`;
    });
    </script>
</body>
</html>
