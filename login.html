<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Dashboard Partners</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #050505;
            color: #fff;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
        }

        /* ===========================
           PANEL IZQUIERDO — IMAGEN
           =========================== */

        .panel-left {
            flex: 0 0 45%;
            position: relative;
            background-image: url('./total-solar-eclipse-close-up-of-solar-flares-2026-01-07-06-35-16-utc.jpg');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .panel-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to right,
                rgba(0, 0, 0, 0.25) 0%,
                rgba(0, 0, 0, 0.15) 50%,
                rgba(5, 5, 5, 0.85) 80%,
                rgba(5, 5, 5, 1) 100%
            );
        }

        .panel-left-content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem;
        }

        .brand-logo {
            height: 30px;
            width: auto;
            filter: brightness(0) invert(1);
            opacity: 0.85;
        }

        .brand-tagline {
            margin-bottom: 1rem;
        }

        .brand-tagline h1 {
            font-size: 3.8rem;
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -2.5px;
            background: linear-gradient(180deg, #ffffff 0%, rgba(255, 255, 255, 0.55) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .brand-tagline p {
            color: rgba(255, 255, 255, 0.45);
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.6;
        }

        .panel-footer {
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.25);
            line-height: 1.5;
        }

        /* ===========================
           PANEL DERECHO — CONTENIDO
           =========================== */

        .panel-right {
            flex: 1;
            position: relative;
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .right-section {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
        }

        /* ===========================
           FORMULARIO DE LOGIN
           =========================== */

        .form-wrap {
            width: 100%;
            max-width: 360px;
        }

        .form-wrap h2 {
            font-size: 2.1rem;
            font-weight: 700;
            letter-spacing: -0.8px;
            margin-bottom: 6px;
        }

        .form-wrap > p {
            color: rgba(255, 255, 255, 0.38);
            font-size: 0.92rem;
            margin-bottom: 2.25rem;
            line-height: 1.5;
        }

        .field-group {
            margin-bottom: 1.1rem;
        }

        .field-group label {
            display: block;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.38);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .field-group input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .field-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .field-group input:focus {
            border-color: rgba(117, 81, 255, 0.5);
            background: rgba(117, 81, 255, 0.04);
            box-shadow: 0 0 0 3px rgba(117, 81, 255, 0.1);
        }

        #login-btn {
            width: 100%;
            padding: 14px 20px;
            margin-top: 0.75rem;
            background: #ffffff;
            color: #050505;
            border: none;
            border-radius: 12px;
            font-size: 0.93rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.1px;
        }

        #login-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        #login-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        #login-btn ion-icon {
            font-size: 1.1rem;
        }

        .hint {
            margin-top: 1.5rem;
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            line-height: 1.6;
        }

        .error-box {
            padding: 11px 15px;
            background: rgba(255, 68, 68, 0.08);
            border: 1px solid rgba(255, 68, 68, 0.18);
            border-radius: 10px;
            color: #ff7070;
            font-size: 0.83rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        /* ===========================
           PANEL DASHBOARDS
           =========================== */

        #dash-panel {
            align-items: flex-start;
            justify-content: flex-start;
            flex-direction: column;
            overflow-y: auto;
            padding: 4rem;
            display: none;
        }

        #dash-panel::-webkit-scrollbar { width: 6px; }
        #dash-panel::-webkit-scrollbar-track { background: transparent; }
        #dash-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 6px; }

        .user-greeting {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
            width: 100%;
        }

        .user-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #7551FF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            flex-shrink: 0;
            box-shadow: 0 0 28px rgba(117, 81, 255, 0.4);
        }

        .greeting-text h2 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
            margin-bottom: 3px;
        }

        .greeting-text p {
            color: rgba(255, 255, 255, 0.38);
            font-size: 0.88rem;
        }

        .clients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.25rem;
            width: 100%;
        }

        /* ===========================
           CARDS DE DASHBOARDS
           =========================== */

        .client-card {
            position: relative;
            height: 210px;
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.6rem;
            background: rgba(18, 18, 18, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            /* Card entry animation */
            opacity: 0;
            transform: translateY(22px);
            transition:
                opacity 0.5s cubic-bezier(0.2, 0.8, 0.2, 1),
                transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1),
                border-color 0.35s ease,
                box-shadow 0.35s ease,
                background 0.35s ease;
        }

        .client-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(var(--brand-rgb), 0.18) 0%, transparent 60%);
            opacity: 0.45;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }

        .client-card:hover {
            transform: translateY(-7px) !important;
            border-color: rgba(var(--brand-rgb), 0.4);
            background: rgba(28, 28, 28, 0.7);
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.5),
                0 0 50px rgba(var(--brand-rgb), 0.12),
                inset 0 0 0 1px rgba(var(--brand-rgb), 0.25);
        }

        .client-card:hover::before {
            opacity: 1;
        }

        .client-card.card-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            z-index: 1;
        }

        .client-logo {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.07);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.4);
        }

        .client-logo img { width: 100%; height: 100%; object-fit: contain; }
        .client-logo span { font-size: 1.5rem; font-weight: 700; color: rgba(255,255,255,0.65); }

        .arrow-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.35);
            transition: all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .client-card:hover .arrow-icon {
            background: rgb(var(--brand-rgb));
            color: #000;
            border-color: transparent;
            box-shadow: 0 0 18px rgba(var(--brand-rgb), 0.55);
        }

        .card-bottom {
            position: relative;
            z-index: 1;
        }

        .card-bottom h3 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 4px;
        }

        .card-slug {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.3);
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        /* Spinning arrow for single-client */
        .arrow-icon.spinning ion-icon {
            animation: spin 1s linear infinite;
        }

        /* ===========================
           TRANSICIONES DE PANEL
           =========================== */

        .panel-exit {
            animation: panelExit 0.35s ease forwards;
            pointer-events: none;
        }

        .panel-enter {
            animation: panelEnter 0.42s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes panelExit {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-14px); }
        }

        @keyframes panelEnter {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===========================
           RESPONSIVE
           =========================== */

        @media (max-width: 900px) {
            html, body { overflow: auto; }

            body { flex-direction: column; }

            .panel-left {
                flex: 0 0 260px;
            }

            .panel-left-content {
                padding: 2rem;
            }

            .brand-tagline h1 {
                font-size: 2.6rem;
            }

            .panel-overlay {
                background: linear-gradient(
                    to bottom,
                    rgba(0, 0, 0, 0.2) 0%,
                    rgba(5, 5, 5, 0.95) 100%
                );
            }

            .panel-right {
                flex: 1;
                min-height: 520px;
            }

            .right-section {
                position: relative;
                padding: 2.5rem 2rem;
            }

            #dash-panel {
                padding: 2.5rem 2rem;
            }
        }

        @media (max-width: 500px) {
            .panel-left { flex: 0 0 200px; }
            .brand-tagline h1 { font-size: 2rem; }
            .clients-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

    <!-- ============================================================
         PANEL IZQUIERDO — Eclipse solar
         ============================================================ -->
    <div class="panel-left">
        <div class="panel-overlay"></div>
        <div class="panel-left-content">
            <img src="src/assets/intra-logo.png" alt="Intra" class="brand-logo"
                onerror="this.style.display='none'">

            <div class="brand-tagline">
                <h1>Sistemas<br>Inteligentes.</h1>
                <p>Accede a resultados en tiempo real.</p>
            </div>

            <footer class="panel-footer">
                &copy; 2026 Dashboard Partners.<br>Todos los derechos reservados.
            </footer>
        </div>
    </div>

    <!-- ============================================================
         PANEL DERECHO — Form → Dashboards
         ============================================================ -->
    <div class="panel-right">

        <!-- PASO 1: Formulario de login -->
        <div id="form-panel" class="right-section">
            <div class="form-wrap">
                <h2>Bienvenido</h2>
                <p>Introduce tus credenciales para acceder a tu espacio de trabajo.</p>

                <div id="error-box" class="error-box"></div>

                <form id="login-form" autocomplete="off">
                    <div class="field-group">
                        <label for="username">Usuario</label>
                        <input type="text" id="username" placeholder="Tu usuario" required autocomplete="username">
                    </div>
                    <div class="field-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>

                    <button type="submit" id="login-btn">
                        <span>Acceder</span>
                        <ion-icon name="arrow-forward-outline"></ion-icon>
                    </button>
                </form>

                <p class="hint">¿Olvidaste tu contraseña? Contacta al administrador.</p>
            </div>
        </div>

        <!-- PASO 2: Selección de dashboards (post-login) -->
        <div id="dash-panel" class="right-section">
            <div class="user-greeting">
                <div class="user-avatar" id="user-avatar">?</div>
                <div class="greeting-text">
                    <h2>Hola, <span id="user-name"></span></h2>
                    <p>Selecciona tu entorno de trabajo</p>
                </div>
            </div>

            <div id="clients-grid" class="clients-grid">
                <!-- Cards inyectadas por JS -->
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="src/config.js"></script>
    <script>
        // ============================================================
        // Gestión de sesión (sin depender de auth.js aquí)
        // ============================================================
        function saveSession(data) {
            localStorage.setItem('intra_session_v2', JSON.stringify({
                ...data,
                timestamp: Date.now()
            }));
        }

        function getSession() {
            try {
                return JSON.parse(localStorage.getItem('intra_session_v2'));
            } catch {
                return null;
            }
        }

        function hexToRgb(hex) {
            if (!hex?.match(/^#[0-9a-fA-F]{6}$/)) return '117, 81, 255';
            return [1, 3, 5].map(i => parseInt(hex.slice(i, i + 2), 16)).join(', ');
        }

        // ============================================================
        // Si ya tiene sesión válida → saltar al panel de dashboards
        // ============================================================
        const existingSession = getSession();
        if (existingSession && (Date.now() - existingSession.timestamp < 86400000)) {
            document.addEventListener('DOMContentLoaded', async () => {
                await showDashboards(existingSession, null);
            });
        }

        // ============================================================
        // Submit del formulario
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const btn = document.getElementById('login-btn');
            const errorBox = document.getElementById('error-box');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();

                btn.disabled = true;
                btn.innerHTML = '<span>Verificando...</span><ion-icon name="sync-outline" style="animation:spin 1s linear infinite"></ion-icon>';
                errorBox.style.display = 'none';

                try {
                    // Autenticar usuario
                    const { data: user, error: userError } = await supabase
                        .from('user_profiles')
                        .select('id, email, name, role, is_active')
                        .eq('email', email)
                        .eq('password', password)
                        .eq('is_active', true)
                        .single();

                    if (userError || !user) throw new Error('Usuario o contraseña incorrectos');

                    // Obtener clientes con sus datos
                    let clients = [];
                    if (user.role === 'admin') {
                        const { data } = await supabase
                            .from('clients_config')
                            .select('id_slug, name, logo_url, theme_primary');
                        clients = data || [];
                    } else {
                        const { data: access } = await supabase
                            .from('user_client_access')
                            .select('client_slug')
                            .eq('user_id', user.id);
                        const slugs = (access || []).map(a => a.client_slug);
                        if (slugs.length > 0) {
                            const { data } = await supabase
                                .from('clients_config')
                                .select('id_slug, name, logo_url, theme_primary')
                                .in('id_slug', slugs);
                            clients = data || [];
                        }
                    }

                    if (clients.length === 0) throw new Error('Sin acceso a ningún entorno');

                    const session = {
                        id: user.id,
                        name: user.name,
                        email: user.email,
                        role: user.role,
                        clients: clients.map(c => c.id_slug)
                    };
                    saveSession(session);

                    await showDashboards(session, clients);

                } catch (err) {
                    errorBox.textContent = err.message || 'Error al ingresar';
                    errorBox.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<span>Acceder</span><ion-icon name="arrow-forward-outline"></ion-icon>';
                }
            });
        });

        // ============================================================
        // Mostrar selección de dashboards
        // ============================================================
        async function showDashboards(session, clients) {
            // Si no se pasaron clientes (sesión ya existente), cargarlos de Supabase
            if (!clients) {
                if (!session.clients || session.clients.length === 0) {
                    window.location.href = 'login.html';
                    return;
                }
                const { data } = await supabase
                    .from('clients_config')
                    .select('id_slug, name, logo_url, theme_primary')
                    .in('id_slug', session.clients);
                clients = data || [];
            }

            if (clients.length === 0) {
                window.location.href = 'login.html';
                return;
            }

            // Si solo tiene 1 cliente, ir directamente con breve animación
            if (clients.length === 1) {
                showSingleClientAccess(session, clients[0]);
                return;
            }

            // Rellenar info del usuario
            const displayName = session.name || session.email || 'Usuario';
            document.getElementById('user-name').textContent = displayName;
            document.getElementById('user-avatar').textContent = displayName.charAt(0).toUpperCase();

            // Inyectar cards
            renderClientCards(clients);

            // Ejecutar transición
            transition(() => {
                // Stagger de cards
                const cards = document.querySelectorAll('.client-card');
                cards.forEach((card, i) => {
                    setTimeout(() => card.classList.add('card-visible'), 80 + i * 110);
                });
            });
        }

        function showSingleClientAccess(session, client) {
            const displayName = session.name || session.email || 'Usuario';
            document.getElementById('user-name').textContent = displayName;
            document.getElementById('user-avatar').textContent = displayName.charAt(0).toUpperCase();

            const rgb = hexToRgb(client.theme_primary);
            const logo = client.logo_url
                ? `<img src="${client.logo_url}" alt="${client.name}">`
                : `<span>${client.name.charAt(0).toUpperCase()}</span>`;

            document.getElementById('clients-grid').innerHTML = `
                <div class="client-card" id="single-card" style="--brand-rgb:${rgb}; cursor:default;">
                    <div class="card-top">
                        <div class="client-logo">${logo}</div>
                        <div class="arrow-icon spinning">
                            <ion-icon name="sync-outline"></ion-icon>
                        </div>
                    </div>
                    <div class="card-bottom">
                        <h3>${client.name}</h3>
                        <span class="card-slug">Accediendo...</span>
                    </div>
                </div>
            `;

            transition(() => {
                const card = document.getElementById('single-card');
                if (card) card.classList.add('card-visible');
                setTimeout(() => {
                    window.location.href = `index.html?client=${client.id_slug}`;
                }, 1400);
            });
        }

        function renderClientCards(clients) {
            const grid = document.getElementById('clients-grid');
            grid.innerHTML = clients.map(c => {
                const rgb = hexToRgb(c.theme_primary);
                const logo = c.logo_url
                    ? `<img src="${c.logo_url}" alt="${c.name}">`
                    : `<span>${c.name.charAt(0).toUpperCase()}</span>`;
                return `
                    <a class="client-card" href="index.html?client=${c.id_slug}" style="--brand-rgb:${rgb}">
                        <div class="card-top">
                            <div class="client-logo">${logo}</div>
                            <div class="arrow-icon">
                                <ion-icon name="arrow-forward-outline"></ion-icon>
                            </div>
                        </div>
                        <div class="card-bottom">
                            <h3>${c.name}</h3>
                            <span class="card-slug">${c.id_slug}</span>
                        </div>
                    </a>
                `;
            }).join('');
        }

        function transition(onComplete) {
            const formPanel = document.getElementById('form-panel');
            const dashPanel = document.getElementById('dash-panel');

            formPanel.classList.add('panel-exit');

            setTimeout(() => {
                formPanel.style.display = 'none';
                dashPanel.style.display = 'flex';

                requestAnimationFrame(() => {
                    dashPanel.classList.add('panel-enter');
                    if (onComplete) onComplete();
                });
            }, 350);
        }
    </script>
</body>

</html>
